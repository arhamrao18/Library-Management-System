<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Bootstrap JS (Popper included) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.profile-card{
    max-width:500px;
    margin:auto;
    margin-top:80px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.profile-header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:30px;
}

.profile-header img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid white;
    object-fit:cover;
}

.profile-body{
    padding:30px;
}

.info{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.buttons{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
}

</style>

</head>

<body>
<div class="container">
    {% if messages %}
{%for message in messages%}
<div class="alert alert-secondary" role="alert">
  {{message}}
</div>
{%endfor%}
{% endif %}
<div class="card profile-card">

    <div class="profile-header">
        <img src="{{N.image.url}}" alt="Profile">
        <h4 class="mt-3">{{N.Name}}</h4>
    </div>

    <div class="profile-body">

        <div class="info">
            <strong>ID</strong>
            <span>{{N.m_id}}</span>
        </div>

        <div class="info">
            <strong>Email</strong>
            <span>{{N.Email}}</span>
        </div>

        <div class="info">
            <strong>Address</strong>
            <span>{{N.Address}}</span>
        </div>

      <div class="d-flex gap-2 mt-3">
    <a href="{% url 'Menue' %}" class="btn btn-primary flex-fill">Dashboard</a>
    <a href="{% url 'login' %}" class="btn btn-danger flex-fill">Logout</a>
</div>

<!-- Change Password button -->
<div class="mt-3">
    <button class="btn btn-warning w-100" type="button" data-bs-toggle="collapse" data-bs-target="#changePassword" aria-expanded="false" aria-controls="changePassword">
        Change Password
    </button>

    <div class="collapse mt-2" id="changePassword">
        <div class="card card-body p-3">
            <form method="POST" action="{% url 'change_password' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="old_password" class="form-label">Old Password</label>
                    <input type="password" class="form-control w-100" id="old_password" name="old_password" required>
                </div>
                <div class="mb-3">
                    <label for="new_password" class="form-label">New Password</label>
                    <input type="password" class="form-control w-100" id="new_password" name="new_password" required>
                </div>
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control w-100" id="confirm_password" name="confirm_password" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Change Password</button>
            </form>
        </div>
    </div>
</div>
        </div>

    </div>

</div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
