{% extends 'basic.html'%}
{% block extra_css %}
<style>
.home-page{
    background:white;
    font-family:Arial;
}

/* Container for all cards */
.card-container{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    margin-top: 100px; /* navbar ke neeche spacing */
}

/* Individual card */
.card-box{
    width: 300px;
    padding: 30px 20px 20px 20px; /* adjust top padding so image doesn't overflow */
    text-align: center;
    border-radius: 20px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    transition: 0.4s;
    background:white;
    position: relative; /* to allow image positioning */
}

/* Hover effect */
.card-box:hover{
    background: black;    /* black background on hover */
    color: white;         /* text turns white */
    transform: translateY(-10px);
    box-shadow: 0px 15px 30px rgba(0,0,0,0.6); /* subtle shadow */
}

/* Profile image */
.profile-img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    margin-top: -55px; /* reduced negative margin */
    border:6px solid white;
    background:white; /* prevent overlap issues */
    position: relative; /* stay inside card */
    z-index: 1;
}

</style>
{% endblock %}

{% block body_class %}
home-page
{% endblock %}

{% block content %}
<div class="card-container">
    {% for i in member %}
        <div class="card-box">
            <img src="{{i.image.url}}" class="profile-img">
            <h4 class="mt-3"><b>ID#</b>{{i.m_id}}</h4>
            <p><b>Name:</b> {{i.Name}}</p>
            <p><b>Gmail:</b> {{i.Email}}</p>
            <p><b>Address:</b> {{i.Address}}</p>
        </div>
    {% endfor %}
</div>
{% endblock %}
